services:
  postgres:
    image: postgres:16-alpine
    container_name: fliver-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fliver}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fliver}
      POSTGRES_DB: ${POSTGRES_DB:-fliver}
    ports:
      - "5432:5432"
    volumes:
      - fliver-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fliver}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  fliver-pgdata:
